<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #ff0088;
    --violet: #8800ff;
    --blue: #0088ff;
    --gold: #ffd700;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.06);
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: var(--rose); border-radius: 2px; }

  body {
    font-family: 'Inter', sans-serif;
    background: #080808;
    color: rgba(255,255,255,0.75);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 3rem 1.5rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse 600px 600px at 10% 20%, rgba(255,0,136,0.03), transparent),
      radial-gradient(ellipse 600px 600px at 90% 80%, rgba(136,0,255,0.03), transparent),
      radial-gradient(ellipse 400px 400px at 50% 50%, rgba(0,136,255,0.02), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1000px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* PRIDE BAR SUPERIOR */
  .pride-bar {
    display: flex;
    height: 3px;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 3rem;
  }
  .pride-bar span {
    flex: 1;
    height: 100%;
  }
  .pride-bar span:nth-child(1) { background: #ff0000; }
  .pride-bar span:nth-child(2) { background: #ff7700; }
  .pride-bar span:nth-child(3) { background: #ffdd00; }
  .pride-bar span:nth-child(4) { background: #00cc44; }
  .pride-bar span:nth-child(5) { background: #0088ff; }
  .pride-bar span:nth-child(6) { background: #8800ff; }
  .pride-bar span:nth-child(7) { background: #ff0088; }

  header {
    text-align: center;
    margin-bottom: 3.5rem;
  }

  .label {
    font-size: 0.7rem;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    letter-spacing: 0.25em;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--rose), var(--violet), var(--blue), var(--rose));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmerText 6s ease infinite;
    margin-bottom: 0.75rem;
  }

  @keyframes shimmerText {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    font-size: 0.8rem;
    font-weight: 300;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .subtitle em {
    font-style: normal;
    color: var(--rose);
    font-weight: 500;
  }

  /* STATS */
  .stats {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-bottom: 3rem;
    padding: 1.25rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(20px);
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    background: linear-gradient(135deg, var(--rose), var(--violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  .divider {
    width: 1px;
    background: var(--border);
  }

  /* PRIDE METER */
  .meter-wrap {
    margin-bottom: 3rem;
    padding: 1.5rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .meter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .meter-header span {
    font-size: 0.7rem;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .meter-header strong {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    background: linear-gradient(90deg, var(--rose), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .meter-track {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }

  .meter-fill {
    height: 100%;
    width: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #ff0000, #ff7700, #ffdd00, #00cc44, #0088ff, #8800ff, #ff0088);
    background-size: 200% 100%;
    animation: meterAnim 3s linear infinite;
  }

  @keyframes meterAnim {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  /* FILTROS */
  .filters {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    background: transparent;
    border: 1px solid var(--border);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .filter-btn:hover,
  .filter-btn.active {
    color: #fff;
    border-color: var(--rose);
    background: rgba(255,0,136,0.08);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.6rem;
    margin-bottom: 3rem;
  }

  .frase {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.9rem 1rem;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    cursor: default;
    line-height: 1.4;
    backdrop-filter: blur(10px);
  }

  .frase::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(255,0,136,0.05), rgba(136,0,255,0.05));
    opacity: 0;
    transition: opacity 0.4s;
  }

  .frase::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, var(--rose), var(--violet));
    opacity: 0;
    transition: opacity 0.4s;
  }

  .frase:hover {
    border-color: rgba(255,0,136,0.15);
    transform: translateY(-2px);
    color: rgba(255,255,255,0.9);
    box-shadow: 0 8px 30px rgba(255,0,136,0.06);
  }

  .frase:hover::before,
  .frase:hover::after {
    opacity: 1;
  }

  .num {
    color: rgba(255,255,255,0.15);
    font-size: 0.7rem;
    font-weight: 500;
    margin-right: 0.4rem;
    font-family: 'DM Mono', monospace;
    transition: color 0.3s;
  }

  .frase:hover .num {
    color: var(--rose);
  }

  .frase[data-cat="love"]:hover { border-color: rgba(255,0,136,0.2); }
  .frase[data-cat="sex"]:hover { border-color: rgba(136,0,255,0.2); }
  .frase[data-cat="pride"]:hover { border-color: rgba(0,136,255,0.2); }
  .frase[data-cat="identity"]:hover { border-color: rgba(255,215,0,0.2); }

  .badge {
    display: none;
    position: absolute;
    top: 0.4rem; right: 0.4rem;
    font-size: 0.55rem;
    font-weight: 500;
    color: rgba(255,255,255,0.15);
    border: 1px solid var(--border);
    padding: 0.1rem 0.4rem;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .badge.show { display: block; }

  footer {
    text-align: center;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }

  footer p {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);

  footer .sig {

    color: rgba(255,255,255,0.15);
    margin-top: 0.5rem;
  }

  .hidden { display: none; }

  @media (max-width: 600px) {
    h1 { font-size: 3rem; }
    .grid { grid-template-columns: 1fr; }
    .stats { gap: 1.5rem; padding: 1rem; flex-wrap: wrap; }
    body { padding: 2rem 1rem; }
  }
</style>
</head>
